name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: python build.py

      - name: Create zip archive
        run: Compress-Archive -Path dist\NANTA\* -DestinationPath NANTA_Windows.zip
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: Update installer version
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          (Get-Content installer.iss) -replace '#define MyAppVersion "1.0.0"', "#define MyAppVersion `"$tag`"" |
            Set-Content installer.iss
        shell: pwsh

      - name: Build installer
        run: iscc installer.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            NANTA_Windows.zip
            installer_output/NANTA_Setup_*.exe
